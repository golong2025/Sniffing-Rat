{% extends 'base.html' %}
{% block content %}
<div id="view-media">
    <div class="section-header">
        <h2><i class="fas fa-images"></i> Media Gallery Hystory</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="media-per-page-select" class="styled-select">
                <option value="20">20 / page</option>
                <option value="50" selected>50 / page</option>
                <option value="100">100 / page</option>
            </select>
            <a href="/" class="icon-btn" style="text-decoration: none;"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
    <div class="media-grid glass" id="media-grid-full"></div>
    <div class="pagination" id="media-pagination">
        <button id="media-prev-btn">Prev</button>
        <span id="media-page-info">Page 1</span>
        <button id="media-next-btn">Next</button>
    </div>
</div>
{% endblock %}
