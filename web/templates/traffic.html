{% extends 'base.html' %}
{% block content %}
<div id="view-traffic">
    <div class="section-header">
        <h2><i class="fas fa-list"></i> Real-time Traffic</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select id="per-page-select" class="styled-select">
                <option value="10">10 / page</option>
                <option value="30">30 / page</option>
                <option value="50" selected>50 / page</option>
            </select>
            <button class="refresh-btn" onclick="fetchTrafficData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <a href="/" class="icon-btn" style="text-decoration: none;"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
    <div class="table-container glass">
        <table id="traffic-table">
            <thead><tr><th>ID</th><th>Time</th><th>Domain</th><th>Path</th><th>Parameters</th><th>Title</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="pagination" id="traffic-pagination">
        <button id="prev-btn">Prev</button>
        <span id="page-info">Page 1</span>
        <button id="next-btn">Next</button>
    </div>
</div>
{% endblock %}
