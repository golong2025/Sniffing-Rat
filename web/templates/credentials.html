{% extends 'base.html' %}
{% block content %}
<div id="view-credentials">
    <div class="section-header">
        <h2><i class="fas fa-key"></i> Intercepted Credentials History</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="refresh-btn" onclick="fetchCredentialsData()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <a href="/" class="icon-btn" style="text-decoration: none;"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </div>
    <div class="table-container glass">
        <table id="credentials-full-table">
            <thead><tr><th>Time</th><th>Domain</th><th>Username</th><th>Password</th><th>Raw Data</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}
